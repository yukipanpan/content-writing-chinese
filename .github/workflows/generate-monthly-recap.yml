name: Generate Monthly Recap

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      month:
        description: "Month to recap (format: YYYY-MM, e.g. 2026-04)"
        required: true
      output_language:
        description: "Output language"
        required: true
        type: choice
        default: "chinese"
        options:
          - chinese
          - english

  # Auto-trigger on the 1st of every month at 09:00 UTC
  schedule:
    - cron: "0 9 1 * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve month (use previous month on scheduled runs)
        id: resolve
        run: |
          if [ -n "${{ inputs.month }}" ]; then
            echo "month=${{ inputs.month }}" >> $GITHUB_OUTPUT
          else
            echo "month=$(date -d 'last month' '+%Y-%m')" >> $GITHUB_OUTPUT
          fi

      - name: Generate monthly recap via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/run_skill.py \
            --template "monthly-recap" \
            --month "${{ steps.resolve.outputs.month }}" \
            --language "${{ inputs.output_language || 'chinese' }}" \
            --snippet-dir "references/snippets" \
            --output-dir "output/monthly-recap"

      - name: Open pull request with recap
        uses: peter-evans/create-pull-request@v6
        with:
          title: "recap: ${{ steps.resolve.outputs.month }} monthly recap"
          body: |
            ## Monthly Recap — ${{ steps.resolve.outputs.month }}

            **Language**: `${{ inputs.output_language || 'chinese' }}`

            Auto-generated from all snippets in `references/snippets/` matching
            prefix `${{ steps.resolve.outputs.month }}`.

            Review and merge to publish.
          branch: "recap/${{ steps.resolve.outputs.month }}"
          commit-message: "recap: ${{ steps.resolve.outputs.month }}"
